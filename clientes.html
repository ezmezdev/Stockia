<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Stockia — Clientes</title>
  <!-- v4.0 -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css?v=4.0">
  <style>
    .codigo-sugerido { font-size:11px;color:var(--azul-accion);margin-top:3px;cursor:pointer; }
    .codigo-sugerido:hover { text-decoration:underline; }
    .error-codigo { font-size:12px;color:var(--rojo);margin-top:4px;display:none; }
    .error-codigo.visible { display:block; }
    .badge-codigo { font-family:monospace;font-size:11px;background:var(--bg);border:1px solid var(--borde);padding:2px 7px;border-radius:6px;color:var(--texto-suave); }
  </style>
</head>
<body>
<div class="app-layout">
  <header class="nav-header">
    <a href="dashboard.html" class="nav-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" class="nav-logo-svg">
        <text x="0" y="40" font-family="Poppins,sans-serif" font-weight="800" font-size="42" fill="white" letter-spacing="-1">St</text>
        <g transform="translate(55,7)">
          <rect x="0" y="12" width="26" height="18" rx="3" fill="white" opacity=".15"/>
          <rect x="0" y="12" width="26" height="18" rx="3" fill="none" stroke="white" stroke-width="2.5"/>
          <path d="M0 12 L5 5 L21 5 L26 12" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
          <line x1="5" y1="5" x2="7" y2="12" stroke="white" stroke-width="1.5" opacity=".6"/>
          <line x1="21" y1="5" x2="19" y2="12" stroke="white" stroke-width="1.5" opacity=".6"/>
          <line x1="13" y1="12" x2="13" y2="30" stroke="white" stroke-width="1.2" opacity=".4"/>
        </g>
        <text x="86" y="40" font-family="Poppins,sans-serif" font-weight="800" font-size="42" fill="white" letter-spacing="-1">ckia</text>
      </svg>
    </a>
    <div class="nav-empresa-badge" id="navEmpresaBadge" style="display:none">
      <span class="nav-empresa-dot"></span><span class="nav-empresa-nombre"></span>
    </div>
    <ul class="nav-links" id="navLinks"></ul>
    <div class="nav-usuario">
      <div class="nav-usuario-info">
        <div class="nav-usuario-nombre" id="navNombre">-</div>
        <div class="nav-usuario-rol"    id="navRol">-</div>
      </div>
      <button class="btn-salir" onclick="cerrarSesion()">🚪 Salir</button>
    </div>
    <button class="nav-hamburguesa" id="navHamburguesa" onclick="toggleMenu()" aria-label="Menú">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </button>
  </header>
  <nav class="nav-menu-movil" id="navMenuMovil">
    <div class="usuario-info" id="menuUsuarioInfo">Cargando...</div>
    <div class="empresa-info" id="menuEmpresaInfo" style="display:none"></div>
    <div class="separador"></div>
    <div id="navMovilLinks"></div>
    <div class="separador"></div>
    <button onclick="cerrarSesion()"><span class="icono">🚪</span> Salir</button>
  </nav>
  <div class="nav-overlay" id="navOverlay" onclick="cerrarMenu()"></div>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-titulo">👥 Clientes</h1>
        <p class="page-subtitulo">Gestioná tu cartera de clientes</p>
      </div>
      <button class="btn btn-acento btn-lg" onclick="abrirNuevoCliente()">➕ Nuevo Cliente</button>
    </div>

    <div class="card mb-24">
      <div class="buscador-contenedor" style="margin-bottom:0">
        <span class="buscador-icono">🔍</span>
        <input type="text" class="buscador-input" id="buscarCliente"
          placeholder="Buscar por código, nombre, DNI o teléfono...">
      </div>
    </div>

    <div class="card">
      <div class="tabla-contenedor">
        <table class="tabla">
          <thead>
            <tr>
              <th>Código</th>
              <th>Nombre</th>
              <th id="thDni">DNI</th>
              <th>Teléfono</th>
              <th id="thDireccion">Dirección</th>
              <th>Deuda activa</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaClientes">
            <tr><td colspan="7"><div class="cargando"><div class="spinner"></div><span>Cargando...</span></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="app-footer">© <span class="anio-actual"></span> Stockia.</footer>
</div>

<!-- MODAL: Nuevo / Editar -->
<div class="modal-overlay" id="modalCliente">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-titulo" id="modalClienteTitulo">👥 Nuevo Cliente</h2>
      <button class="modal-cerrar" onclick="cerrarModal('modalCliente')">✕</button>
    </div>

    <!-- Código -->
    <div class="form-grupo">
      <label class="form-label">Código de cliente</label>
      <input type="text" class="form-input" id="cliCodigo" placeholder="Ej: CLI-001"
        oninput="limpiarErrorCodigo()">
      <div class="codigo-sugerido" id="cliCodigoSugerido" onclick="usarSugeridoCli()"></div>
      <div class="error-codigo" id="cliErrCodigo">⚠ Este código ya existe para otro cliente.</div>
    </div>

    <div class="form-grupo">
      <label class="form-label">Nombre completo *</label>
      <input type="text" class="form-input" id="cliNombre" placeholder="Ej: María González">
    </div>

    <!-- DNI y dirección: se ocultan en modo kiosco -->
    <div id="camposMayorista">
      <div class="form-grupo">
        <label class="form-label">DNI</label>
        <input type="text" class="form-input" id="cliDni" placeholder="Ej: 30123456" inputmode="numeric">
      </div>
      <div class="form-grupo">
        <label class="form-label">Dirección</label>
        <input type="text" class="form-input" id="cliDireccion" placeholder="Ej: Av. San Martín 1234">
      </div>
    </div>

    <div class="form-fila">
      <div class="form-grupo">
        <label class="form-label">Teléfono</label>
        <input type="tel" class="form-input" id="cliTelefono" placeholder="Ej: 1145678901">
      </div>
      <div class="form-grupo">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="cliEmail" placeholder="cliente@email.com" inputmode="email">
      </div>
    </div>
    <div class="form-grupo">
      <label class="form-label">Notas</label>
      <textarea id="cliNotas" class="form-textarea" placeholder="Información adicional..."></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cerrarModal('modalCliente')">Cancelar</button>
      <button class="btn btn-primario" id="btnGuardarCliente" onclick="guardarCliente()">💾 Guardar Cliente</button>
    </div>
  </div>
</div>

<!-- MODAL: Detalle -->
<div class="modal-overlay" id="modalDetalleCliente">
  <div class="modal" style="max-width:750px">
    <div class="modal-header">
      <h2 class="modal-titulo" id="detalleClienteTitulo">👤 Detalle</h2>
      <button class="modal-cerrar" onclick="cerrarModal('modalDetalleCliente')">✕</button>
    </div>
    <div id="detalleClienteContenido"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/global.js?v=4.0"></script>
<script>
  let empresaId     = null;
  let empresa       = null;
  let clienteActual = null;
  let modoEdicion   = false;
  let todosClientes = [];
  let esAdmin       = false;
  let kiosco        = false;

  (async () => {
    const sesion = await verificarSesion();
    if (!sesion) return;
    if (sesion.esAdminGlobal && !sesion.empresa) { window.location.href = 'admin-global.html'; return; }
    empresa   = sesion.empresa;
    empresaId = empresa?.id;
    esAdmin   = sesion.esAdminGlobal || sesion.perfil.rol === 'admin_empresa';
    kiosco    = esKiosco();

    if (empresa?.modulos_habilitados?.clientes === false) {
      document.querySelector('.main-content').innerHTML = `<div class="estado-vacio" style="padding-top:80px"><div class="estado-vacio-icono">🔒</div><div class="estado-vacio-titulo">Módulo deshabilitado</div><a href="dashboard.html" class="btn btn-ghost mt-16">← Volver</a></div>`;
      return;
    }

    // En modo kiosco ocultar columnas DNI y dirección
    if (kiosco) {
      document.getElementById('thDni').style.display       = 'none';
      document.getElementById('thDireccion').style.display = 'none';
      document.getElementById('camposMayorista').style.display = 'none';
    }

    construirNav();
    await cargarClientes();

    let timer;
    document.getElementById('buscarCliente').addEventListener('input', e => {
      clearTimeout(timer); timer = setTimeout(() => cargarClientes(e.target.value.trim()), 350);
    });
  })();

  async function cargarClientes(query = '') {
    const tbody = document.getElementById('tablaClientes');
    tbody.innerHTML = '<tr><td colspan="7"><div class="cargando"><div class="spinner"></div></div></td></tr>';

    let q = sb.from('clientes').select('*').eq('empresa_id', empresaId).eq('activo', true).order('nombre');
    if (query) q = q.or(`nombre.ilike.%${query}%,dni.ilike.%${query}%,telefono.ilike.%${query}%,codigo.ilike.%${query}%`);
    const { data, error } = await q;
    if (error) { tbody.innerHTML = `<tr><td colspan="7"><div class="estado-vacio"><div class="estado-vacio-icono">⚠️</div><div class="estado-vacio-titulo">Error</div><div class="estado-vacio-desc">${error.message}</div></div></td></tr>`; return; }

    if (!data?.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="estado-vacio">
        <div class="estado-vacio-icono">👥</div>
        <div class="estado-vacio-titulo">${query ? 'Sin resultados' : 'Sin clientes registrados'}</div>
        <div class="estado-vacio-desc">${query ? 'Probá con otro término.' : 'Agregá el primer cliente.'}</div>
        ${!query ? '<button class="btn btn-acento" onclick="abrirNuevoCliente()">➕ Nuevo Cliente</button>' : ''}
      </div></td></tr>`;
      return;
    }
    todosClientes = data;

    const { data: ventas } = await sb.from('ventas').select('cliente_id,saldo').eq('empresa_id', empresaId).gt('saldo', 0);
    const deudaMap = {};
    ventas?.forEach(v => { if (v.cliente_id) deudaMap[v.cliente_id] = (deudaMap[v.cliente_id]||0) + Number(v.saldo||0); });

    tbody.innerHTML = data.map(c => {
      const deuda = deudaMap[c.id] || 0;
      const dniCol      = kiosco ? '' : `<td>${c.dni||'<span class="texto-suave">-</span>'}</td>`;
      const direccionCol = kiosco ? '' : `<td class="texto-suave">${c.direccion||'-'}</td>`;
      return `<tr>
        <td><span class="badge-codigo">${c.codigo||'—'}</span></td>
        <td>
          <div class="fw-600">${c.nombre}</div>
          ${c.email?`<div style="font-size:11px;color:var(--texto-suave)">${c.email}</div>`:''}
        </td>
        ${dniCol}
        <td>${c.telefono?`<a href="tel:${c.telefono}" style="color:var(--azul-accion)">${c.telefono}</a>`:'<span class="texto-suave">-</span>'}</td>
        ${direccionCol}
        <td class="${deuda>0?'texto-rojo fw-600':'texto-suave'}">${deuda>0?formatoPeso(deuda):'—'}</td>
        <td><div class="tabla-acciones">
          <button class="btn btn-ghost btn-sm" onclick="verDetalleCliente('${c.id}')">👁️</button>
          <button class="btn btn-ghost btn-sm" onclick="editarCliente('${c.id}')">✏️</button>
          ${esAdmin?`<button class="btn btn-peligro btn-sm" onclick="eliminarCliente('${c.id}','${c.nombre.replace(/'/g,"\\'")}')">🗑️</button>`:''}
        </div></td>
      </tr>`;
    }).join('');
  }

  async function abrirNuevoCliente() {
    clienteActual=null; modoEdicion=false;
    document.getElementById('modalClienteTitulo').textContent='👥 Nuevo Cliente';
    ['cliCodigo','cliNombre','cliDni','cliTelefono','cliEmail','cliDireccion','cliNotas'].forEach(id => {
      const el = document.getElementById(id); if(el) el.value='';
    });
    limpiarErrorCodigo();
    // Sugerir siguiente código
    const sig = await siguienteCodigo('cliente', empresaId);
    const sugerido = document.getElementById('cliCodigoSugerido');
    sugerido.textContent = `Sugerido: ${sig} (click para usar)`;
    sugerido.dataset.valor = sig;
    abrirModal('modalCliente');
  }

  function editarCliente(id) {
    clienteActual=todosClientes.find(c=>c.id===id); if(!clienteActual)return;
    modoEdicion=true;
    document.getElementById('modalClienteTitulo').textContent='✏️ Editar Cliente';
    document.getElementById('cliCodigo').value   =clienteActual.codigo   ||'';
    document.getElementById('cliNombre').value   =clienteActual.nombre;
    document.getElementById('cliDni').value      =clienteActual.dni      ||'';
    document.getElementById('cliTelefono').value =clienteActual.telefono ||'';
    document.getElementById('cliEmail').value    =clienteActual.email    ||'';
    document.getElementById('cliDireccion').value=clienteActual.direccion||'';
    document.getElementById('cliNotas').value    =clienteActual.notas    ||'';
    document.getElementById('cliCodigoSugerido').textContent='';
    limpiarErrorCodigo();
    abrirModal('modalCliente');
  }

  async function guardarCliente() {
    const nombre = document.getElementById('cliNombre').value.trim();
    const codigo = document.getElementById('cliCodigo').value.trim() || null;
    if (!nombre) { mostrarAlerta('El nombre es obligatorio.', 'error'); return; }

    if (codigo) {
      const unico = await codigoEsUnico('clientes', 'codigo', codigo, empresaId, clienteActual?.id||null);
      if (!unico) { document.getElementById('cliErrCodigo').classList.add('visible'); return; }
    }

    const datos = {
      empresa_id: empresaId, nombre, codigo,
      dni:       kiosco ? null : (document.getElementById('cliDni').value.trim()||null),
      telefono:  document.getElementById('cliTelefono').value.trim()||null,
      email:     document.getElementById('cliEmail').value.trim()||null,
      direccion: kiosco ? null : (document.getElementById('cliDireccion').value.trim()||null),
      notas:     document.getElementById('cliNotas').value.trim()||null,
    };

    const btn=document.getElementById('btnGuardarCliente');
    btn.disabled=true; btn.textContent='Guardando...';
    try {
      const{error}=modoEdicion&&clienteActual
        ?await sb.from('clientes').update(datos).eq('id',clienteActual.id)
        :await sb.from('clientes').insert(datos);
      if(error)throw error;
      mostrarAlerta(modoEdicion?'Cliente actualizado ✓':'Cliente creado ✓','exito');
      cerrarModal('modalCliente');
      await cargarClientes(document.getElementById('buscarCliente').value.trim());
    }catch(err){mostrarAlerta('Error: '+err.message,'error');}
    finally{btn.disabled=false;btn.textContent='💾 Guardar Cliente';}
  }

  async function eliminarCliente(id,nombre) {
    if(!confirm(`¿Desactivar a "${nombre}"?`))return;
    await sb.from('clientes').update({activo:false}).eq('id',id);
    mostrarAlerta('Cliente eliminado ✓','exito');
    await cargarClientes(document.getElementById('buscarCliente').value.trim());
  }

  async function verDetalleCliente(id) {
    const c=todosClientes.find(x=>x.id===id); if(!c)return;
    document.getElementById('detalleClienteTitulo').textContent=`👤 ${c.nombre}`;
    const cont=document.getElementById('detalleClienteContenido');
    cont.innerHTML='<div class="cargando"><div class="spinner"></div></div>';
    abrirModal('modalDetalleCliente');
    const{data:ventas}=await sb.from('ventas').select('*').eq('empresa_id',empresaId).eq('cliente_id',id).order('created_at',{ascending:false});
    const deudaTotal=ventas?.reduce((s,v)=>s+Number(v.saldo||0),0)||0;
    cont.innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
        ${c.codigo?`<div style="padding:10px;background:var(--bg);border-radius:var(--r-sm)"><div class="texto-suave" style="font-size:11px">CÓDIGO</div><div class="fw-600;font-family:monospace">${c.codigo}</div></div>`:''}
        ${!kiosco&&c.dni?`<div style="padding:10px;background:var(--bg);border-radius:var(--r-sm)"><div class="texto-suave" style="font-size:11px">DNI</div><div class="fw-600">${c.dni}</div></div>`:''}
        <div style="padding:10px;background:var(--bg);border-radius:var(--r-sm)"><div class="texto-suave" style="font-size:11px">TELÉFONO</div><div class="fw-600">${c.telefono?`<a href="tel:${c.telefono}" style="color:var(--azul-accion)">${c.telefono}</a>`:'-'}</div></div>
        ${c.email?`<div style="padding:10px;background:var(--bg);border-radius:var(--r-sm)"><div class="texto-suave" style="font-size:11px">EMAIL</div><div class="fw-600" style="font-size:12px">${c.email}</div></div>`:''}
        ${!kiosco&&c.direccion?`<div style="padding:10px;background:var(--bg);border-radius:var(--r-sm);grid-column:1/-1"><div class="texto-suave" style="font-size:11px">DIRECCIÓN</div><div class="fw-600">${c.direccion}</div></div>`:''}
      </div>
      <div style="background:${deudaTotal>0?'#FEF2F2':'#ECFDF5'};border:1px solid ${deudaTotal>0?'#FECACA':'#A7F3D0'};border-radius:var(--r-sm);padding:14px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
        <span style="font-weight:600;color:${deudaTotal>0?'#DC2626':'#059669'}">${deudaTotal>0?'💳 Deuda pendiente':'✓ Sin deuda'}</span>
        ${deudaTotal>0?`<span style="font-size:20px;font-weight:800;color:#DC2626">${formatoPeso(deudaTotal)}</span>`:''}
      </div>
      <h3 style="font-size:14px;font-weight:700;margin-bottom:12px">📋 Historial</h3>
      ${!ventas?.length?`<p class="texto-suave texto-centro" style="padding:20px">Sin compras registradas.</p>`:`
        <div class="tabla-contenedor"><table class="tabla">
          <thead><tr><th>Fecha</th><th>Cód.Venta</th><th>Artículo</th><th>Total</th><th>Saldo</th><th>Estado</th></tr></thead>
          <tbody>${ventas.map(v=>`<tr>
            <td>${formatoFecha(v.created_at)}</td>
            <td><span class="badge-codigo">${v.codigo_venta||'—'}</span></td>
            <td class="fw-600">${v.articulo_nombre||'-'}</td>
            <td>${formatoPeso(v.total)}</td>
            <td class="${Number(v.saldo)>0?'texto-rojo fw-600':'texto-suave'}">${formatoPeso(v.saldo)}</td>
            <td><span class="badge ${v.estado==='pagado'?'badge-verde':v.estado==='parcial'?'badge-naranja':'badge-rojo'}">${v.estado}</span></td>
          </tr>`).join('')}</tbody>
        </table></div>`}`;
  }

  function limpiarErrorCodigo() { document.getElementById('cliErrCodigo')?.classList.remove('visible'); }
  function usarSugeridoCli() {
    const s=document.getElementById('cliCodigoSugerido');
    if(s?.dataset?.valor) document.getElementById('cliCodigo').value=s.dataset.valor;
  }
</script>
</body>
</html>
