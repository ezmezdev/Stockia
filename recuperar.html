<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Stockia — Recuperar contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Poppins', sans-serif; min-height: 100vh; overflow-x: hidden; }
    body {
      background: #1a2f6b;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px 16px 72px; position: relative;
    }
    body::before {
      content: ''; position: fixed; top: -30%; right: -20%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(59,130,246,.18) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: ''; position: fixed; bottom: -20%; left: -10%;
      width: 40vw; height: 40vw;
      background: radial-gradient(circle, rgba(16,185,129,.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .logo-area { text-align: center; margin-bottom: 28px; position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }
    .logo-svg { width: 180px; height: auto; }
    .logo-sub { color: rgba(255,255,255,.6); font-size: 13px; margin-top: 4px; }
    .card {
      background: #fff; border-radius: 20px; padding: 32px 28px;
      width: 100%; max-width: 420px; position: relative; z-index: 1;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    .card-titulo { font-size: 20px; font-weight: 800; color: #1a2f6b; margin-bottom: 6px; }
    .card-subtitulo { font-size: 13px; color: #64748b; margin-bottom: 24px; line-height: 1.5; }
    .form-grupo { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-input {
      width: 100%; padding: 12px 14px; border: 2px solid #e5e7eb; border-radius: 10px;
      font-size: 14px; font-family: 'Poppins', sans-serif; outline: none;
      transition: border-color .2s;
    }
    .form-input:focus { border-color: #1a2f6b; }
    .form-input.error { border-color: #ef4444; }
    .form-error { font-size: 12px; color: #ef4444; margin-top: 4px; display: none; }
    .form-error.visible { display: block; }
    .btn-enviar {
      width: 100%; padding: 14px; background: #1a2f6b; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      font-family: 'Poppins', sans-serif; cursor: pointer; margin-top: 8px;
      transition: background .2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-enviar:hover:not(:disabled) { background: #162d6e; }
    .btn-enviar:disabled { opacity: .7; cursor: not-allowed; }
    .alerta {
      display: none; align-items: center; gap: 8px; padding: 10px 14px;
      border-radius: 8px; font-size: 13px; margin-bottom: 16px;
    }
    .alerta.error   { display: flex; background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
    .alerta.exito   { display: flex; background: #ecfdf5; border: 1px solid #a7f3d0; color: #059669; }
    .volver { text-align: center; margin-top: 20px; font-size: 13px; color: rgba(255,255,255,.7); }
    .volver a { color: #fff; font-weight: 600; text-decoration: none; }
    .volver a:hover { text-decoration: underline; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .copyright { color: rgba(255,255,255,.4); font-size: 11px; margin-top: 24px; position: relative; z-index: 1; }
  </style>
</head>
<body>

  <div class="logo-area">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" class="logo-svg">
      <text x="0" y="40" font-family="Poppins,sans-serif" font-weight="800" font-size="42" fill="white" letter-spacing="-1">St</text>
      <g transform="translate(55,7)">
        <rect x="0" y="12" width="26" height="18" rx="3" fill="white" opacity=".15"/>
        <rect x="0" y="12" width="26" height="18" rx="3" fill="none" stroke="white" stroke-width="2.5"/>
        <path d="M0 12 L5 5 L21 5 L26 12" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
        <line x1="5" y1="5" x2="7" y2="12" stroke="white" stroke-width="1.5" opacity=".6"/>
        <line x1="21" y1="5" x2="19" y2="12" stroke="white" stroke-width="1.5" opacity=".6"/>
        <line x1="13" y1="12" x2="13" y2="30" stroke="white" stroke-width="1.2" opacity=".4"/>
      </g>
      <text x="86" y="40" font-family="Poppins,sans-serif" font-weight="800" font-size="42" fill="white" letter-spacing="-1">ckia</text>
    </svg>
    <span class="logo-sub">Sistema de gestión de inventario</span>
  </div>

  <div class="card">
    <div class="card-titulo">🔑 Recuperar contraseña</div>
    <div class="card-subtitulo">Ingresá tu email y te enviamos un link para crear una nueva contraseña.</div>

    <div class="alerta error" id="alertaError">
      <span>⚠️</span><span id="alertaErrorTexto"></span>
    </div>
    <div class="alerta exito" id="alertaExito">
      <span>✅</span><span id="alertaExitoTexto"></span>
    </div>

    <div id="seccionForm">
      <div class="form-grupo">
        <label class="form-label" for="email">Correo electrónico</label>
        <input type="email" id="email" class="form-input" placeholder="tu@email.com"
          autocomplete="email" inputmode="email">
        <div class="form-error" id="errorEmail">Ingresá un email válido.</div>
      </div>
      <button class="btn-enviar" id="btnEnviar" onclick="enviarRecuperacion()">
        <span id="btnEnviarTexto">Enviar link de recuperación</span>
      </button>
    </div>
  </div>

  <div class="volver">
    <a href="login.html">← Volver al inicio de sesión</a>
  </div>

  <div class="copyright">© <span id="anio"></span> Stockia. Todos los derechos reservados.</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL      = 'https://okovdfkkadhzjgteblus.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9rb3ZkZmtrYWRoempndGVibHVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MjcxMjksImV4cCI6MjA5MDUwMzEyOX0.EmIq6n14sJ7lkID3XTwi4RnoEm5CYtYYULibzPbSeg0';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('anio').textContent = new Date().getFullYear();

    async function enviarRecuperacion() {
      const email = document.getElementById('email').value.trim();
      document.getElementById('alertaError').className = 'alerta';
      document.getElementById('alertaExito').className = 'alerta';

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('errorEmail').classList.add('visible');
        document.getElementById('email').classList.add('error');
        return;
      }
      document.getElementById('errorEmail').classList.remove('visible');
      document.getElementById('email').classList.remove('error');

      const btn = document.getElementById('btnEnviar');
      btn.disabled = true;
      document.getElementById('btnEnviarTexto').innerHTML = '<div class="spinner"></div>';

      try {
        const { error } = await sb.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/nueva-password.html',
        });

        if (error) {
          document.getElementById('alertaErrorTexto').textContent = 'No se pudo enviar el email. Verificá la dirección ingresada.';
          document.getElementById('alertaError').className = 'alerta error';
          btn.disabled = false;
          document.getElementById('btnEnviarTexto').textContent = 'Enviar link de recuperación';
          return;
        }

        // Éxito — ocultar el form y mostrar mensaje
        document.getElementById('seccionForm').style.display = 'none';
        document.getElementById('alertaExitoTexto').textContent =
          `Te enviamos un link a ${email}. Revisá tu bandeja de entrada (y el spam).`;
        document.getElementById('alertaExito').className = 'alerta exito';

      } catch {
        document.getElementById('alertaErrorTexto').textContent = 'Error de conexión. Intentá nuevamente.';
        document.getElementById('alertaError').className = 'alerta error';
        btn.disabled = false;
        document.getElementById('btnEnviarTexto').textContent = 'Enviar link de recuperación';
      }
    }

    // Permitir enviar con Enter
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') enviarRecuperacion();
    });
  </script>
</body>
</html>
